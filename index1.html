<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>💣 Сапёр</title>
    <style>
        /* ---------- Базовые стили ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #eee;
            margin: 0;
            padding: 16px;
        }
        .game-wrapper {
            background: #16213e;
            border-radius: 24px;
            padding: 24px 28px 32px 28px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
            max-width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            font-weight: 700;
            font-size: 28px;
            letter-spacing: 2px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255, 200, 0, 0.15);
        }
        .top-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            gap: 20px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .difficulty-group {
            display: flex;
            gap: 8px;
        }
        .difficulty-btn {
            background: #0f3460;
            border: none;
            color: #aaa;
            padding: 6px 16px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
            font-family: inherit;
        }
        .difficulty-btn:hover {
            background: #1a4a7a;
            color: #fff;
        }
        .difficulty-btn.active {
            background: #e94560;
            color: #fff;
            border-color: #ff6b81;
            box-shadow: 0 0 15px rgba(233, 69, 96, 0.3);
        }
        .stats {
            display: flex;
            align-items: center;
            gap: 20px;
            background: #0f3460;
            padding: 6px 18px 6px 18px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 18px;
            letter-spacing: 1px;
        }
        .stats span {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .stats .icon {
            font-size: 20px;
        }
        .stats .value {
            min-width: 36px;
            text-align: center;
            color: #ffd700;
        }
        .stats .value.timer {
            color: #7fc9ff;
        }
        .reset-btn {
            background: #0f3460;
            border: none;
            color: #fff;
            font-size: 28px;
            line-height: 1;
            padding: 4px 14px;
            border-radius: 30px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .reset-btn:hover {
            background: #e94560;
        }
        /* ---------- Поле ---------- */
        .board-wrapper {
            background: #0f3460;
            padding: 10px;
            border-radius: 16px;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
            margin-top: 4px;
            overflow: auto;
            max-width: 100%;
        }
        .board {
            display: inline-grid;
            gap: 2px;
            background: #0f3460;
            margin: 0 auto;
        }
        .cell {
            width: 36px;
            height: 36px;
            background: #1a4a7a;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.1s, transform 0.05s;
            box-shadow: 0 2px 0 rgba(0, 0, 0, 0.3);
            color: #fff;
            position: relative;
        }
        .cell:hover {
            background: #2a5a8a;
            transform: scale(1.02);
        }
        .cell.opened {
            background: #2a3a5a;
            box-shadow: inset 0 0 6px rgba(0, 0, 0, 0.5);
            cursor: default;
            transform: none;
        }
        .cell.opened:hover {
            background: #2a3a5a;
            transform: none;
        }
        .cell.mine {
            background: #e94560;
            box-shadow: inset 0 0 10px rgba(233, 69, 96, 0.6);
        }
        .cell.mine::after {
            content: "💣";
            font-size: 20px;
            line-height: 1;
        }
        .cell.flagged::after {
            content: "🚩";
            font-size: 20px;
            line-height: 1;
        }
        .cell.mine-exploded {
            background: #ff4444;
            box-shadow: 0 0 20px #ff4444;
        }
        .cell .num-1 {
            color: #4a9eff;
        }
        .cell .num-2 {
            color: #44cc88;
        }
        .cell .num-3 {
            color: #ff6b6b;
        }
        .cell .num-4 {
            color: #9b59b6;
        }
        .cell .num-5 {
            color: #f39c12;
        }
        .cell .num-6 {
            color: #1abc9c;
        }
        .cell .num-7 {
            color: #e67e22;
        }
        .cell .num-8 {
            color: #7f8c8d;
        }
        /* ---------- Адаптив ---------- */
        @media (max-width: 700px) {
            .game-wrapper {
                padding: 16px;
            }
            .top-panel {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }
            .difficulty-group {
                justify-content: center;
            }
            .stats {
                justify-content: center;
                font-size: 16px;
                padding: 4px 12px;
            }
            .cell {
                width: 28px;
                height: 28px;
                font-size: 14px;
            }
            .cell.mine::after,
            .cell.flagged::after {
                font-size: 16px;
            }
            .board-wrapper {
                padding: 6px;
            }
        }
        @media (max-width: 480px) {
            .cell {
                width: 22px;
                height: 22px;
                font-size: 11px;
                gap: 1px;
            }
            .cell.mine::after,
            .cell.flagged::after {
                font-size: 13px;
            }
            .stats .value {
                min-width: 24px;
            }
        }
        /* ---------- Сообщение победы / поражения ---------- */
        .message-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
            z-index: 10;
            animation: fadeIn 0.3s;
        }
        .message-overlay.active {
            display: flex;
        }
        .message-box {
            background: #16213e;
            padding: 40px 50px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.7);
            animation: scaleUp 0.3s;
        }
        .message-box h2 {
            font-size: 42px;
            margin-bottom: 12px;
        }
        .message-box p {
            font-size: 20px;
            color: #aaa;
            margin-bottom: 24px;
        }
        .message-box .btn-ok {
            background: #e94560;
            border: none;
            color: #fff;
            padding: 12px 40px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
            font-family: inherit;
        }
        .message-box .btn-ok:hover {
            background: #ff6b81;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        @keyframes scaleUp {
            from {
                transform: scale(0.9);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
        .win .message-box h2 {
            color: #ffd700;
        }
        .lose .message-box h2 {
            color: #ff4444;
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <h1>💣 САПЁР</h1>

        <div class="top-panel">
            <div class="difficulty-group">
                <button class="difficulty-btn active" data-level="easy">Лёгкий</button>
                <button class="difficulty-btn" data-level="medium">Средний</button>
                <button class="difficulty-btn" data-level="hard">Сложный</button>
            </div>
            <div class="stats">
                <span><span class="icon">💣</span><span class="value" id="mineCounter">10</span></span>
                <span><span class="icon">⏱️</span><span class="value timer" id="timerDisplay">0</span></span>
                <button class="reset-btn" id="resetBtn">↻</button>
            </div>
        </div>

        <div class="board-wrapper">
            <div class="board" id="board"></div>
        </div>
    </div>

    <!-- Модальное окно -->
    <div class="message-overlay" id="messageOverlay">
        <div class="message-box">
            <h2 id="msgTitle">🎉 Победа!</h2>
            <p id="msgDesc">Вы отлично справились!</p>
            <button class="btn-ok" id="msgBtn">Играть снова</button>
        </div>
    </div>

    <script>
        // ================================================================
        //  САПЁР — полная логика
        // ================================================================

        // ---- Конфигурация уровней ----
        const LEVELS = {
            easy: { rows: 9, cols: 9, mines: 10 },
            medium: { rows: 16, cols: 16, mines: 40 },
            hard: { rows: 16, cols: 30, mines: 99 },
        };

        // ---- Состояние игры ----
        let currentLevel = 'easy';
        let rows = 9,
            cols = 9,
            totalMines = 10;
        let board = []; // 2D массив объектов клеток
        let gameOver = false;
        let firstClick = true;
        let timerInterval = null;
        let seconds = 0;
        let flagsPlaced = 0;
        let openedCount = 0;

        // DOM-элементы
        const boardEl = document.getElementById('board');
        const mineCounter = document.getElementById('mineCounter');
        const timerDisplay = document.getElementById('timerDisplay');
        const resetBtn = document.getElementById('resetBtn');
        const msgOverlay = document.getElementById('messageOverlay');
        const msgTitle = document.getElementById('msgTitle');
        const msgDesc = document.getElementById('msgDesc');
        const msgBtn = document.getElementById('msgBtn');

        // ---- Вспомогательные функции ----
        function formatTime(sec) {
            return sec < 60 ? sec : Math.floor(sec / 60) + ':' + String(sec % 60).padStart(2, '0');
        }

        function updateMineCounter() {
            const remaining = totalMines - flagsPlaced;
            mineCounter.textContent = remaining >= 0 ? remaining : 0;
        }

        function updateTimer() {
            timerDisplay.textContent = formatTime(seconds);
        }

        // ---- Остановить таймер ----
        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        // ---- Запустить таймер (при первом клике) ----
        function startTimer() {
            if (timerInterval) return;
            seconds = 0;
            updateTimer();
            timerInterval = setInterval(() => {
                seconds++;
                updateTimer();
            }, 1000);
        }

        // ---- Сбросить таймер ----
        function resetTimer() {
            stopTimer();
            seconds = 0;
            updateTimer();
        }

        // ---- Инициализация поля (без мин) ----
        function initBoard(rows, cols, mines) {
            board = [];
            for (let r = 0; r < rows; r++) {
                board[r] = [];
                for (let c = 0; c < cols; c++) {
                    board[r][c] = {
                        mine: false,
                        opened: false,
                        flagged: false,
                        adjacentMines: 0,
                    };
                }
            }
            totalMines = mines;
            flagsPlaced = 0;
            openedCount = 0;
            gameOver = false;
            firstClick = true;
            updateMineCounter();
            resetTimer();
            renderBoard();
            // Скрыть сообщение
            msgOverlay.classList.remove('active');
            msgOverlay.className = 'message-overlay';
        }

        // ---- Расстановка мин после первого клика (гарантируем безопасную клетку) ----
        function placeMines(safeRow, safeCol) {
            let placed = 0;
            // Создаём список всех клеток, исключая безопасную и её соседей (опционально)
            const candidates = [];
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    // Не ставить мину в safe клетку и её соседей (чтобы первый клик всегда открывал пустую область)
                    if (Math.abs(r - safeRow) <= 1 && Math.abs(c - safeCol) <= 1) continue;
                    candidates.push({ r, c });
                }
            }
            // Перемешиваем и берём первые totalMines
            shuffleArray(candidates);
            for (let i = 0; i < Math.min(totalMines, candidates.length); i++) {
                const { r, c } = candidates[i];
                board[r][c].mine = true;
                placed++;
            }
            // Если мин меньше, чем нужно (редкий случай), добиваем случайными (безопасная уже исключена)
            if (placed < totalMines) {
                for (let r = 0; r < rows && placed < totalMines; r++) {
                    for (let c = 0; c < cols && placed < totalMines; c++) {
                        if (Math.abs(r - safeRow) <= 1 && Math.abs(c - safeCol) <= 1) continue;
                        if (!board[r][c].mine) {
                            board[r][c].mine = true;
                            placed++;
                        }
                    }
                }
            }
            // Вычисляем числа
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (board[r][c].mine) continue;
                    let count = 0;
                    for (let dr = -1; dr <= 1; dr++) {
                        for (let dc = -1; dc <= 1; dc++) {
                            if (dr === 0 && dc === 0) continue;
                            const nr = r + dr,
                                nc = c + dc;
                            if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && board[nr][nc].mine) count++;
                        }
                    }
                    board[r][c].adjacentMines = count;
                }
            }
        }

        // ---- Перемешивание массива ----
        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
        }

        // ---- Рендер доски ----
        function renderBoard() {
            boardEl.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
            boardEl.innerHTML = '';
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    cell.addEventListener('click', () => handleClick(r, c));
                    cell.addEventListener('contextmenu', (e) => { e.preventDefault();
                        handleRightClick(r, c); });
                    // двойной клик для быстрого открытия (если все флаги расставлены)
                    cell.addEventListener('dblclick', () => handleDoubleClick(r, c));
                    boardEl.appendChild(cell);
                }
            }
        }

        // ---- Получить DOM-элемент клетки ----
        function getCellEl(row, col) {
            return boardEl.children[row * cols + col];
        }

        // ---- Обновить отображение одной клетки ----
        function updateCell(row, col) {
            const data = board[row][col];
            const el = getCellEl(row, col);
            // Сброс классов
            el.className = 'cell';
            if (data.opened) {
                el.classList.add('opened');
                if (data.mine) {
                    el.classList.add('mine');
                    // если это взорвавшаяся мина (при поражении добавим отдельно)
                } else if (data.adjacentMines > 0) {
                    const span = document.createElement('span');
                    span.className = 'num-' + data.adjacentMines;
                    span.textContent = data.adjacentMines;
                    el.appendChild(span);
                } else {
                    // пустая клетка
                }
            } else {
                if (data.flagged) {
                    el.classList.add('flagged');
                }
            }
            // Если игра окончена и это мина, но не открыта — показываем мину (при поражении)
            if (gameOver && data.mine && !data.opened) {
                el.classList.add('mine');
                // если взорвавшаяся мина уже отмечена отдельно
            }
            // Если игра окончена и клетка с флагом без мины — показываем крест (опционально)
            if (gameOver && data.flagged && !data.mine && !data.opened) {
                el.textContent = '❌';
                el.style.fontSize = '18px';
            }
        }

        // ---- Обновить всю доску ----
        function refreshBoard() {
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    updateCell(r, c);
                }
            }
        }

        // ---- Обработка левого клика ----
        function handleClick(row, col) {
            if (gameOver) return;
            const data = board[row][col];
            if (data.flagged) return;
            if (data.opened) return;

            // Первый клик
            if (firstClick) {
                firstClick = false;
                placeMines(row, col);
                startTimer();
            }

            // Если мина — проигрыш
            if (data.mine) {
                loseGame(row, col);
                return;
            }

            // Открываем клетку
            openCell(row, col);
            checkWin();
        }

        // ---- Обработка правого клика (флаг) ----
        function handleRightClick(row, col) {
            if (gameOver) return;
            const data = board[row][col];
            if (data.opened) return;
            data.flagged = !data.flagged;
            if (data.flagged) flagsPlaced++;
            else flagsPlaced--;
            updateMineCounter();
            updateCell(row, col);
        }

        // ---- Двойной клик (если все флаги вокруг цифры расставлены) ----
        function handleDoubleClick(row, col) {
            if (gameOver) return;
            const data = board[row][col];
            if (!data.opened || data.mine) return;
            if (data.adjacentMines === 0) return;

            // Подсчитаем количество флагов вокруг
            let flagsAround = 0;
            for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                    if (dr === 0 && dc === 0) continue;
                    const nr = row + dr,
                        nc = col + dc;
                    if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && board[nr][nc].flagged) flagsAround++;
                }
            }
            if (flagsAround === data.adjacentMines) {
                // Открываем все соседние не открытые и не зафлагованные
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        if (dr === 0 && dc === 0) continue;
                        const nr = row + dr,
                            nc = col + dc;
                        if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) {
                            const neighbor = board[nr][nc];
                            if (!neighbor.opened && !neighbor.flagged) {
                                if (neighbor.mine) {
                                    loseGame(nr, nc);
                                    return;
                                } else {
                                    openCell(nr, nc);
                                }
                            }
                        }
                    }
                }
                checkWin();
            }
        }

        // ---- Открыть клетку (рекурсивно для пустых) ----
        function openCell(row, col) {
            const data = board[row][col];
            if (data.opened || data.flagged) return;
            if (data.mine) return;

            data.opened = true;
            openedCount++;
            updateCell(row, col);

            // Если клетка пустая (0 мин вокруг) — открываем соседей
            if (data.adjacentMines === 0) {
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        if (dr === 0 && dc === 0) continue;
                        const nr = row + dr,
                            nc = col + dc;
                        if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) {
                            const neighbor = board[nr][nc];
                            if (!neighbor.opened && !neighbor.flagged && !neighbor.mine) {
                                openCell(nr, nc);
                            }
                        }
                    }
                }
            }
        }

        // ---- Проверка победы ----
        function checkWin() {
            if (gameOver) return;
            // Победа, если все не-мины открыты
            const totalSafe = rows * cols - totalMines;
            if (openedCount === totalSafe) {
                winGame();
            }
        }

        // ---- Поражение ----
        function loseGame(row, col) {
            if (gameOver) return;
            gameOver = true;
            stopTimer();

            // Показываем все мины
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (board[r][c].mine) {
                        const el = getCellEl(r, c);
                        el.classList.add('mine');
                        if (r === row && c === col) {
                            el.classList.add('mine-exploded');
                        }
                        // Если клетка была зафлагована, убираем флаг
                        if (board[r][c].flagged) {
                            board[r][c].flagged = false;
                            el.classList.remove('flagged');
                        }
                        // Обновляем отображение
                        updateCell(r, c);
                    } else {
                        // Если на не-мине стоит флаг — показываем крест
                        if (board[r][c].flagged) {
                            const el = getCellEl(r, c);
                            el.textContent = '❌';
                            el.style.fontSize = '18px';
                            el.classList.add('opened');
                        }
                    }
                }
            }
            // Открываем взорванную клетку (мина)
            const el = getCellEl(row, col);
            el.classList.add('opened', 'mine', 'mine-exploded');
            // Показываем сообщение
            showMessage(false);
        }

        // ---- Победа ----
        function winGame() {
            if (gameOver) return;
            gameOver = true;
            stopTimer();
            // Помечаем все мины флагами (если не помечены)
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (board[r][c].mine && !board[r][c].flagged) {
                        board[r][c].flagged = true;
                        flagsPlaced++;
                        updateCell(r, c);
                    }
                }
            }
            updateMineCounter();
            showMessage(true);
        }

        // ---- Показать сообщение ----
        function showMessage(win) {
            msgOverlay.className = 'message-overlay active ' + (win ? 'win' : 'lose');
            msgTitle.textContent = win ? '🎉 Победа!' : '💥 Поражение!';
            msgDesc.textContent = win ?
                `Вы открыли все клетки за ${formatTime(seconds)}!` :
                `Вы наткнулись на мину! Попробуйте ещё раз.`;
        }

        // ---- Сброс игры (рестарт) ----
        function resetGame() {
            stopTimer();
            const level = LEVELS[currentLevel];
            rows = level.rows;
            cols = level.cols;
            totalMines = level.mines;
            initBoard(rows, cols, totalMines);
            // обновить кнопки сложности
            document.querySelectorAll('.difficulty-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.level === currentLevel);
            });
            // Скрыть сообщение
            msgOverlay.classList.remove('active');
        }

        // ---- Смена сложности ----
        function setLevel(level) {
            if (level === currentLevel) {
                resetGame();
                return;
            }
            currentLevel = level;
            resetGame();
        }

        // ---- Инициализация событий ----
        function initEvents() {
            // Кнопки сложности
            document.querySelectorAll('.difficulty-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    setLevel(btn.dataset.level);
                });
            });

            // Кнопка сброса
            resetBtn.addEventListener('click', resetGame);

            // Кнопка в модалке
            msgBtn.addEventListener('click', resetGame);

            // Предотвращаем контекстное меню на поле
            boardEl.addEventListener('contextmenu', (e) => e.preventDefault());
        }

        // ---- Запуск игры ----
        function initGame() {
            const level = LEVELS[currentLevel];
            rows = level.rows;
            cols = level.cols;
            totalMines = level.mines;
            initBoard(rows, cols, totalMines);
            initEvents();
        }

        // ---- Старт ----
        initGame();
    </script>
</body>
</html>
